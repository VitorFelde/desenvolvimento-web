<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAPA MUNDIAL</title>

    <style>
        .cubo1 {
            background-color: rgb(70, 230, 97);
            width: 20px;
            border: 1px solid black;
        }

        .cubo2 {
            background-color: rgb(41, 106, 55);
            width: 20px;
            border: 1px solid black;
        }

        .cubo3 {
            background-color: rgb(28, 61, 32);
            width: 20px;
            border: 1px solid black;
        }

        .cubo4 {
            background-color: rgb(36, 70, 209);
            width: 20px;
            border: 1px solid black;
        }

        .cubo5 {
            background-color: rgb(0, 40, 134);
            width: 20px;
            border: 1px solid black;
        }
    </style>






</head>

<body>




    <table>
        <thead>
            Mapa mundial mostrando os censos mais
            recentes dos países a partir de 2014:
            <tr>
                <td class="cubo1"></td>
                <td>2005 ou depois</td>
            </tr>

            <tr>
                <td class="cubo2"></td>
                <td>2000 - 2004</td>
            </tr>

            <tr>
                <td class="cubo3"></td>
                <td>1995 - 1999</td>
            </tr>

            <tr>
                <td class="cubo4"></td>
                <td>1990 - 1994</td>
            </tr>

            <tr>
                <td class="cubo5"></td>
                <td>1970 - 1989</td>
            </tr>
        </thead>
    </table>




</body>

</html>
