<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carros legais</title>


    <style>
        img {
            width: 80px;
        }

        .cinza {
            background-color: #6E6E6E;
            color: white;
            padding: 15px;
            border-collapse: collapse;
        }


        table {
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>


</head>

<body>

    <table>
        <tr class="cinza">
            <th>Imagem</th>
            <th>Modelo</th>
            <th>Consumo</th>
        </tr>

        <tr>
            <td><img src="https://storage.googleapis.com/ire-74774-ope/files%2Fmigration%2Ftb_fotos-25010-460.jpg" alt="clio"></td>
            <td>Clio</td>
            <td>15,8 km/l</td>
        </tr>

        <tr>
            <td><img src="https://revistacarro.com.br/wp-content/uploads/2018/05/619.png" alt="palio"></td>
            <td>Palio fire</td>
            <td>15,4 km/l</td>
        </tr>

        <tr>
            <td><img src="https://www.viemar.com/userfiles/solucoes/02-fiat-uno.png" alt="uno"></td>
            <td>Novo Uno</td>
            <td>15,2 km/l</td>
        </tr>

        <tr>
            <td><img src="https://cdn.autopapo.com.br/carro/volkswagen/up-10-12v-tsi-eflex-red-up-2017/destaque-v2.png"
                    alt="upão da massa"></td>
            <td>Up</td>
            <td>14,3 km/l</td>
        </tr>
    </table>


</body>

</html>
