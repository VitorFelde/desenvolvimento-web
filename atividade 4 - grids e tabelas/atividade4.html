<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados</title>

    <style>
        .tabela {
            display: grid;
            grid-template-columns: repeat(5, 2fr);
            border: 1px solid black;
            padding: 0px;
            font-family: sans-serif;
        }



        .titulo {
            grid-column: 1/6;
            background-color: lightgreen;
            font-weight: 700;
            text-align: center;
        }

        .embaixo {
            grid-column: 1/3;
            text-align: center;
        }

        .embaixo2 {
            text-align: center;
            grid-column: 4/6;
        }

        .domeio {
            color: darkgrey;
        }

        div {
            text-align: center;
        }

        .rodape {
            grid-column: 1/6;
            background-color: darkblue;
            color: white;
            display: flex;
            justify-content: center;

        }

        .embaixo {
            text-align: center;
            padding-right: 180px;

        }

        .embaixo2 {
            text-align: center;
            padding-left: 180px;

        }
    </style>



</head>

<body>

    <div class="tabela">

        <div class="titulo">15° Rodada</div>

        <div class="time1">Goiás</div>
        <div class="resultado1">0</div>
        <div class="domeio">x</div>
        <div class="resultado2">1</div>
        <div class="time2">Inter</div>

        <div class="time1">Palmeiras</div>
        <div class="resultado1">1</div>
        <div class="domeio">x</div>
        <div class="resultado2">0</div>
        <div class="time2">São Paulo</div>

        <div class="time1">Cruzeiro</div>
        <div class="resultado1">3</div>
        <div class="domeio">x</div>
        <div class="resultado2">0</div>
        <div class="time2">Santos</div>
        <!--Pq até aqui meu santão precisa perder?-->


        <div class="time1">Botafogo</div>
        <div class="resultado1">2</div>
        <div class="domeio">x</div>
        <div class="resultado2">0</div>
        <div class="time2">Fluminense</div>


        <div class="rodape">

            <div class="embaixo">Série A</div>
            <div class="embaixo2">2014</div>

        </div>

    </div>




</body>

</html>
