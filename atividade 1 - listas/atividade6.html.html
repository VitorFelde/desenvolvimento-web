<!DOCTYPE html>

<html lang="pt-br">

<meta charset="utf-8">

<head>

<title>Destinos</title>

<style>

h1 {margin: 0;} /* remove todas as margens do h1 */

h2 {
    margin: 1px; /* margem externa de 1px */
    color: #7f077f; /* cor do texto */
    background-color: #fbfb2c78; /* cor de fundo */
    display: inline-block; /* faz o elemento ocupar só o tamanho do conteúdo */
    padding: 0px; /* remove espaço interno */
}

ol {
    margin-top: 0; /* remove espaço acima da lista ordenada */
}

.caixa {
    border: 1px solid gray; /* borda cinza de 1px */
    width: 180px; /* largura da caixa */
    padding: 10px; /* espaço interno */
    border-radius: 5px; /* cantos arredondados */
}

hr {
    border-top: dashed; /* borda superior tracejada */
    color: #7f077f; /* cor da linha */
}

</style>


</head>

<body>

    

<h1>Melhores destinos turísticos
</h1>

    <hr>

    <div class="caixa">

<h2>Foz do Iguaçu</h2>
 
<ol>

    <li>Cataratas do Iguaçu</li>
    <li>Itaipu</li>
    <li>Argentina e Paraguai</li>


</ol>

<h2>Salvador</h2>

<h2>Rio de Janeiro</h2>

    <ol type="a">
        <li>Cristo Redentor</li>
        <li>Pão de Açucar</li>

    </ol>

    <h2>Maranhão</h2>

    </div>

</body>

</html>
