<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 5</title>
</head>
<body>
    
    <script>

        let valor = Number(prompt ("Digite o valor do carro: "));
        let ano = Number(prompt("Digite o ano de fabricação"));
        let soma = 0;

        if (ano > 2024) {
        
            soma = valor * 0.05;
            alert ("Valor do seguro é: " + soma);
            
        }

        if (ano >= 2014 && ano <= 2024){

            soma = valor * 0.10;
            alert ("Valor do seguro é: " + soma);
            
        }

        if (ano < 2014) {

            soma = valor * 0.15;
            alert ("Valor do seguro é: " + soma);
            
        }
    </script>


</body>
</html>
