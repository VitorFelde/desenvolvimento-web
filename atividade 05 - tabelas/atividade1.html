<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLANETAS</title>

    <style>
        table {
            width: 100%;
            border-collapse: collapse;

        }

        th,
        td {
            border: 1px solid black;
            padding: 0px;
            text-align: center;
            vertical-align: middle;
        }

        th {
           border: 0;
        }

        img {
            width: 80px;
            height: auto;
            display: block;
            margin: 0 auto;
        }


        .distancia-terra {
            color: navy;
            font-weight: bold;
        }

        span {
            color: red;
        }

        h1 {
            text-align: center;
        }
    </style>
</head>

<body>

    <table>

        <h1>Distâncias em relação ao <span>Sol</span></h1>

        <thead>
            <tr>
                <th>Planeta</th>
                <th>Nome</th>
                <th>Distância</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><img src="https://images.vexels.com/media/users/3/157971/isolated/preview/393140c13ded6abdd322098d2d02a6d7-ilustracao-do-planeta-terra.png"
                        alt="terra"></td>
                <td>Terra</td>
                <td class="distancia-terra">1 AU</td>
            </tr>
            <tr>
                <td><img src="https://images.vexels.com/media/users/3/205478/isolated/preview/4a42dba3e55a9bcc9764720d87f2ca93-ilustracao-do-planeta-venus.png"
                        alt="venus"></td>
                <td>Vênus</td>
                <td>0.72 AU</td>
            </tr>
            <tr>
                <td><img src="https://images.vexels.com/media/users/3/203280/isolated/preview/e4ec0e6c9a425aae4e152ef8b4a0d86a-ilustracao-do-planeta-marte.png"
                        alt="marte"></td>
                <td>Marte</td>
                <td>1.52 AU</td>
            </tr>
            <tr>
                <td><img src="https://images.vexels.com/media/users/3/203225/isolated/preview/e643e05082c2e8a93fbe2231d56888db-ilustracao-do-planeta-jupiter.png"
                        alt="Jupiter"></td>
                <td>Júpiter</td>
                <td>5.20 AU</td>
            </tr>
            <tr>
                <td><img src="https://images.vexels.com/media/users/3/205476/isolated/preview/56e1687ae914c14cb0ed474f0982f45f-ilustracao-do-planeta-saturno.png"
                        alt="saturno"></td>
                <td>Saturno</td>
                <td>9.58 AU</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
