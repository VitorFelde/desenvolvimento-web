<html lang="en">

<head>

  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>Calculo da Media</title>

  <style>
    h1 {

    span {

    }

    body {
      display: grid;
      grid-template-columns: repeat(3, 100px); /*assim fica 3 colunas, com as labels tendo 2 elementos, que nem o forms*/
      gap: 20px; /*espacamento entre as colunas*/
    }

    h1 {
      grid-column: span 3; /*se nao fica tudo bugado, ocupa as 3 colunas*/
    }

    div {
      grid-column: span 3;
    }

    label {
      display: grid;
      grid-template-rows: auto auto; /*tamanho top*/
      gap: 5px;
    }

    .tabela-intervalos {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .tabelaintervalos h3 { /*assim aplica so no texto do titulo*/
      margin-bottom: 5px;
      color: gray;
    }
  </style>
</head>
