<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogs</title>
</head>

<body>
    <div style="display: flex; flex-direction: column; align-items: start;">

        <button onclick="proximo()">Proxima foto</button>
        <img id="foto1" src="" alt="cachorrofoda">
        <button onclick="voltar()">Foto anterior</button>
        <pre id="source"></pre>

    </div>

    <script>

        let dogs = [
            "https://images.dog.ceo/breeds/rajapalayam-indian/Rajapalayam-dog.jpg",
            "https://images.dog.ceo/breeds/mountain-swiss/n02107574_819.jpg",
            "https://images.dog.ceo/breeds/terrier-kerryblue/n02093859_1456.jpg",
            "https://images.dog.ceo/breeds/german-shepherd/n02106662_6931.jpg"

        ]


        async function loadImage() {

            const api = await fetch("https://dog.ceo/api/breeds/image/random");

            const result = await api.json();

            const image = result.message;

            foto1.src = image;


        }

        //    loadImage()

        let indice = 0;

        function proximo() {




            if (indice == dogs.length - 1) {
                indice = 0;
            }


            else {



                indice++;

            }

            foto1.src = dogs[indice];

            source.innerText = indice;

        }


        function voltar() {

            if (indice == 0) {

                indice = dogs.lenght - 1;


                foto1.src = dogs[indice];
            }

            else {

                foto1.src = dogs[indice - 1];

                indice--;


            }

            source.innerText = indice
        }





    </script>
</body>

</html>
