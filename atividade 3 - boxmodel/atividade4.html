<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>

    <style>
        .caixamaior {
            width: 600px;
        }

        div {
            display: inline-block;
        }

        .caixa1,
        .caixa2,
        .caixa3,
        .caixa4,
        .caixa5,
        .caixa6,
        .caixa7,
        .caixa8,
        .caixa9 {
            box-sizing: border-box;
            width: 150px;
            height: 150px;
            border: 2px solid #5a5a5a;
            margin: 15px;
        }

        .caixa1,
        .caixa9,
        .caixa3,
        .caixa4 {
            background-color: #ffff6b;
        }

        .caixa2,
        .caixa5,
        .caixa7,
        .caixa6,
        .caixa8 {
            background-color: #adfbad;
        }


        .roxo {background-color: #ddcaf8;}


        .caixa1,
        .caixa2,
        .caixa3,
        .caixa4,
        .caixa5,
        .caixa6,
        .caixa7,
        .caixa8,
        .caixa9 {
            border-radius: 100%;
        }
    </style>


</head>

<body>

    <div class="caixamaior">
        <div class="caixa1"></div>
        <div class="roxo">
            <div class="caixa2"></div>
        </div>
        <div class="caixa3"></div>
        <div class="caixa4"></div>
        <div class="roxo">
            <div class="caixa5"></div>
        </div>
        <div class="caixa6"></div>
        <div class="caixa7"></div>
        <div class="roxo">
            <div class="caixa8"></div>
        </div>
        <div class="caixa9"></div>
    </div>



</body>

</html>
