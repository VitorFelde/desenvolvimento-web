<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>

    <style>
        .caixamaior {
            width: 900px;
        }

        div {
            display: inline-block;
        }

        .caixa1,
        .caixa2,
        .caixa3,
        .caixa4,
        .caixa5,
        .caixa6,
        .caixa7,
        .caixa8,
        .caixa9,
        .caixa10,
        .caixa11,
        .caixa12,
        .caixa13,
        .caixa14,
        .caixa15 {
            box-sizing: border-box;
            width: 150px;
            height: 150px;
            border: 2px solid #5a5a5a;
            margin: 3px;
        }

        .caixa1,
        .caixa6 {
            background-color: #ffff6b;
        }

        .caixa3,
        .caixa7,
        .caixa11 {
            background-color: #adfbad;
        }

        .caixa10 {
            background-color: #ffc1a9;
        }

        .caixa1,
        .caixa7,
        .caixa13 {
            border-radius: 100%;
        }

        .caixa2,
        .caixa8,
        .caixa14 {
            border: 25px solid #72bb72;
        }

        .caixa5,
        .caixa9,
        .caixa15 {
            border: 0;
            background-color: white;
        }
    </style>


</head>

<body>

    <div class="caixamaior">
        <div class="caixa1"></div>
        <div class="caixa2"></div>
        <div class="caixa3"></div>
        <div class="caixa4"></div>
        <div class="caixa5"></div>
        <div class="caixa6"></div>
        <div class="caixa7"></div>
        <div class="caixa8"></div>
        <div class="caixa9"></div>
        <div class="caixa10"></div>
        <div class="caixa11"></div>
        <div class="caixa12"></div>
        <div class="caixa13"></div>
        <div class="caixa14"></div>
        <div class="caixa15"></div>
    </div>



</body>

</html>
