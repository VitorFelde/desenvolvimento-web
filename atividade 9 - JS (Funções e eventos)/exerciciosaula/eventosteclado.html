<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>
      Lorem ipsum dolor sit amet, consectetur adipisicing elit. Molestiae, magni
      iusto aspernatur perferendis praesentium laborum, provident asperiores
      quam obcaecati maxime exercitationem voluptas. Nobis id nesciunt
      temporibus maxime facilis laboriosam in.
    </h1>

    <!-- Input de entrada: onde o usuário digita -->
    <!-- oninput: dispara a cada tecla, mudança ou colagem de texto -->
    <!-- Passamos 'this.value' (o texto atual deste input) para a função -->
    <input
      placeholder="escreve ai"
      type="text"
      oninput="nome2.value = converteMaiusculo(this.value)"
    />

    <!-- Input de saída: apenas mostra o resultado -->
    <!-- 'disabled' impede que o usuário digite direto aqui -->
    <!-- 'id="nome2"' é usado para o JavaScript saber onde colocar o texto convertido -->
    <input type="text" disabled id="nome2" />

    <script src="eventosteclado.js"></script>
  </body>
</html>
