<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 3</title>

    <style>
        table {
            border: #999999 1px solid;
            border-collapse: collapse;
            font-family: Arial, Helvetica, sans-serif;
        }


        td {
            padding-right: 9px;
            padding-left: 9px;
            padding-top: 2px;
        }

        .tit {
            color: #090387;
            font-weight: 600;
        }

        tr:nth-child(1) {
            background-color: white;
        }

        td:nth-child(odd) {
            background-color: lightgreen;
        }

        tr td.branco {
            background-color: white;
            /*como a pseudoclasse é mais forte, é necessario utilizar uma categoria mais especifica para que possa predominar, nesse caso uma classe.*/
        }
    </style>

</head>

<body>


    <table>

        <tr class="tit">
            <td class="branco">Local</td>
            <td>Cidade</td>
            <td class="branco">Estado</td>
            <td>Tipo</td>
        </tr>
        <tr>
            <td>IFPR</td>
            <td>Foz do Iguaçu</td>
            <td>PR</td>
            <td>Federal</td>
        </tr>
        <tr>
            <td>UEL</td>
            <td>Londrina</td>
            <td>PR</td>
            <td>Estadual</td>
        </tr>
        <tr>
            <td>Unioeste</td>
            <td>Cascavel</td>
            <td>PR</td>
            <td>Estadual</td>
        </tr>
        <tr>
            <td>UTFPR</td>
            <td>Medianeira</td>
            <td>PR</td>
            <td>Federal</td>
        </tr>


    </table>









</body>

</html>
