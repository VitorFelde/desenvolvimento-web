<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>

    </style>
</head>

<body>
    <form>
        <label>
            <span>Nome</span>
            <input type="text" name="nome" placeholder="Nome">
        </label>

        <label>
            <span>E-mail</span>
            <input type="email" name="email" placeholder="user@example.org">
        </label>

        <label>
            <span>Password</span>
            <input type="password" name="senha" placeholder="6 caracteres">
        </label>

        <label>
            <span>Possui conhecimento?</span>

            <div>
                <input type="checkbox" name="JavaScript">
                <span>JavaScript</span>
                <input type="checkbox" name="HTML">
                <span>HTML</span>
                <input type="checkbox" name="CSS">
                <span>CSS</span>
            </div>
        </label>

        <label>
            <span>Curso</span>
            <input type="text">
        </label>
    </form>
</body>

</html>
